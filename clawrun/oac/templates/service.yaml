apiVersion: v1
kind: Service
metadata:
  name: clawrun-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: clawrun
  ports:
    - protocol: TCP
      name: web
      port: 3000
      targetPort: 3000
    - protocol: TCP
      name: charts
      port: 3001
      targetPort: 3001
