apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: clawrun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawrun
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: clawrun
      annotations:
        # Exclude port 3001 from Envoy iptables interception so app-service
        # can download chart tarballs without JWT auth check
        traffic.sidecar.istio.io/excludeInboundPorts: "3001"
    spec:
      serviceAccountName: clawrun-labeler
      containers:
        - name: clawrun
          image: "apepkuss/clawrun:0.3.3"
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - containerPort: 3000
              name: web
            - containerPort: 3001
              name: charts
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: OS_SYSTEM_SERVER
              value: "system-server.user-system-{{ if .Values.bfl }}{{ .Values.bfl.username }}{{ end }}"
            - name: OS_APP_KEY
              value: "{{ if .Values.bfl }}{{ .Values.bfl.appKey }}{{ end }}"
            - name: OS_APP_SECRET
              value: "{{ if .Values.bfl }}{{ .Values.bfl.appSecret }}{{ end }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/clawrun"
            type: DirectoryOrCreate
