# Olares injects the following variables automatically at install time:
#   .Values.userspace.appData   — persistent data path (JuiceFS)
#   .Values.userspace.appCache  — local cache path
#   .Values.bfl.username        — current username
#   OS_SYSTEM_SERVER            — system-server internal address (auto-injected)
#   OS_APP_KEY                  — app key for system-server auth (auto-injected)
#   OS_APP_SECRET               — app secret for system-server auth (auto-injected)
