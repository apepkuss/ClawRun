apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: init-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /data/config /data/workspace
              chown -R 1000:1000 /data/config /data/workspace
          volumeMounts:
            - name: config-data
              mountPath: /data/config
            - name: workspace-data
              mountPath: /data/workspace
          securityContext:
            runAsUser: 0
        - name: init-config
          image: "alpine/openclaw:2026.3.2"
          command:
            - sh
            - "-c"
            - |
              node dist/index.js config set \
                gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true
              node dist/index.js config set \
                gateway.controlUi.dangerouslyDisableDeviceAuth true
              # Default model is managed entirely by ClawRun wizard — do not set here.
          env:
            - name: HOME
              value: "/home/node"
          volumeMounts:
            - name: config-data
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: "alpine/openclaw:2026.3.2"
          # Wait for iptables-bypass sidecar to finish, then start gateway.
          command:
            - sh
            - "-c"
            - |
              while [ ! -f /iptables-ready/done ]; do sleep 0.5; done
              exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
          ports:
            - containerPort: 18789
              name: gateway
          env:
            - name: HOME
              value: "/home/node"
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "{{ .Values.olaresEnv.OPENCLAW_GATEWAY_TOKEN }}"
            - name: ANTHROPIC_API_KEY
              value: "{{ .Values.olaresEnv.ANTHROPIC_API_KEY }}"
            - name: OPENAI_API_KEY
              value: "{{ .Values.olaresEnv.OPENAI_API_KEY }}"
            - name: ZAI_API_KEY
              value: "{{ .Values.olaresEnv.ZAI_API_KEY }}"
            - name: OLLAMA_API_KEY
              value: "{{ .Values.olaresEnv.OLLAMA_API_KEY }}"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: config-data
              mountPath: /home/node/.openclaw
            - name: workspace-data
              mountPath: /home/node/.openclaw/workspace
            - name: iptables-ready
              mountPath: /iptables-ready
        # Sidecar: set iptables RETURN rules as root to bypass Olares Envoy sidecar.
        # Uses trusted image (beclab/) that OPA allows to run as root.
        # - PREROUTING 18789: bypass inbound Envoy auth for gateway port
        # - OUTPUT 11434: bypass outbound Envoy for Ollama connectivity
        - name: iptables-bypass
          image: "beclab/init:v1.2.3"
          command:
            - sh
            - "-c"
            - |
              iptables-legacy -t nat -I PREROUTING -p tcp --dport 18789 -j RETURN 2>/dev/null || \
                iptables -t nat -I PREROUTING -p tcp --dport 18789 -j RETURN 2>/dev/null || true
              iptables-legacy -t nat -I OUTPUT -p tcp --dport 11434 -j RETURN 2>/dev/null || \
                iptables -t nat -I OUTPUT -p tcp --dport 11434 -j RETURN 2>/dev/null || true
              touch /iptables-ready/done
              sleep infinity
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: iptables-ready
              mountPath: /iptables-ready
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: iptables-ready
          emptyDir: {}
        - name: config-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/config"
            type: DirectoryOrCreate
        - name: workspace-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/workspace"
            type: DirectoryOrCreate
