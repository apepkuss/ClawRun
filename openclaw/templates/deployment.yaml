apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: init-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /data/config /data/workspace
              chown -R 1000:1000 /data/config /data/workspace
          volumeMounts:
            - name: config-data
              mountPath: /data/config
            - name: workspace-data
              mountPath: /data/workspace
          securityContext:
            runAsUser: 0
        - name: init-config
          image: "alpine/openclaw:2026.3.2"
          command:
            - sh
            - "-c"
            - |
              node dist/index.js config set \
                gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true
              node dist/index.js config set \
                gateway.controlUi.dangerouslyDisableDeviceAuth true

              if [ -n "$ZAI_API_KEY" ]; then
                node dist/index.js config set agents.defaults.model zai/glm-4.7-flash
              elif [ -n "$OPENAI_API_KEY" ]; then
                node dist/index.js config set agents.defaults.model openai/gpt-4o
              fi
          env:
            - name: HOME
              value: "/home/node"
            - name: ANTHROPIC_API_KEY
              value: "{{ .Values.olaresEnv.ANTHROPIC_API_KEY }}"
            - name: OPENAI_API_KEY
              value: "{{ .Values.olaresEnv.OPENAI_API_KEY }}"
            - name: ZAI_API_KEY
              value: "{{ .Values.olaresEnv.ZAI_API_KEY }}"
          volumeMounts:
            - name: config-data
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          # Custom image with iptables pre-installed (official image is Debian-based, no apk).
          # OPA blocks untrusted images running as root, so iptables is baked into the image.
          image: "apepkuss/openclaw:2026.3.2-olares"
          # Bypass Olares Envoy sidecar: must run in entrypoint AFTER
          # olares-sidecar-init sets up iptables REDIRECT rules.
          command:
            - sh
            - "-c"
            - |
              iptables-legacy -t nat -I PREROUTING -p tcp --dport 18789 -j RETURN 2>/dev/null || \
                iptables -t nat -I PREROUTING -p tcp --dport 18789 -j RETURN 2>/dev/null || true
              iptables-legacy -t nat -I OUTPUT -p tcp --dport 11434 -j RETURN 2>/dev/null || \
                iptables -t nat -I OUTPUT -p tcp --dport 11434 -j RETURN 2>/dev/null || true
              exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - containerPort: 18789
              name: gateway
          env:
            - name: HOME
              value: "/home/node"
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "{{ .Values.olaresEnv.OPENCLAW_GATEWAY_TOKEN }}"
            - name: ANTHROPIC_API_KEY
              value: "{{ .Values.olaresEnv.ANTHROPIC_API_KEY }}"
            - name: OPENAI_API_KEY
              value: "{{ .Values.olaresEnv.OPENAI_API_KEY }}"
            - name: ZAI_API_KEY
              value: "{{ .Values.olaresEnv.ZAI_API_KEY }}"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: config-data
              mountPath: /home/node/.openclaw
            - name: workspace-data
              mountPath: /home/node/.openclaw/workspace
      volumes:
        - name: config-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/config"
            type: DirectoryOrCreate
        - name: workspace-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/workspace"
            type: DirectoryOrCreate
