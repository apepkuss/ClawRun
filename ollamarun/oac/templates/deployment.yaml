apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: ollamarun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollamarun
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollamarun
    spec:
      initContainers:
        - name: iptables-bypass
          image: "beclab/init:v1.2.3"
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - sh
            - -c
            - |
              iptables-legacy -t nat -I PREROUTING -p tcp --dport 11434 -j RETURN 2>/dev/null || true
              iptables-legacy -t nat -I OUTPUT -p tcp --dport 443 -j RETURN 2>/dev/null || true
      containers:
        - name: ollamarun
          image: "ollama/ollama:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: api
          env:
            # 监听所有接口，允许 Pod 外部访问
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            # 模型加载后保持 24 小时不卸载
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            # CPU 模式下限制并行推理数，避免 OOM
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 16Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/ollamarun"
            type: DirectoryOrCreate
