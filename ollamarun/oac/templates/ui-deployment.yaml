apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollamarun-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: ollamarun-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollamarun-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollamarun-ui
    spec:
      initContainers:
        - name: iptables-bypass
          image: "beclab/init:v1.2.3"
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - sh
            - -c
            - |
              iptables-legacy -t nat -I OUTPUT -p tcp --dport 11434 -j RETURN 2>/dev/null || true
      containers:
        - name: ollamarun-ui
          image: "apepkuss/ollamarun:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: web
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: OLLAMA_BASE_URL
              value: "http://ollamarun-svc:11434"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
