olaresManifest.version: '0.10.0'
olaresManifest.type: app

metadata:
  name: ollamarun
  description: Run LLM models on CPU — no GPU required. Includes model management UI.
  icon: https://raw.githubusercontent.com/apepkuss/ClawRun/refs/heads/main/img/icon.png
  appid: ollamarun
  version: '0.2.1'
  title: OllamaRun
  categories:
    - Utilities

entrances:
  - name: ollamarun-ui
    port: 3000
    host: ollamarun-ui-svc
    title: OllamaRun
    icon: https://raw.githubusercontent.com/apepkuss/ClawRun/refs/heads/main/img/icon.png
    authLevel: private
    openMethod: window
  - name: ollamarun-api
    port: 11434
    host: ollamarun-svc
    title: Ollama API
    authLevel: private
    openMethod: default
    invisible: true

permission:
  appData: true
  appCache: true

spec:
  versionName: '0.2.1'
  fullDescription: |
    OllamaRun edition for Olares.
    Runs LLM inference entirely on CPU — no NVIDIA GPU required.
    Includes a web-based model management UI for browsing, downloading,
    and deleting models from the Ollama library.
    Exposes the standard Ollama REST API on port 11434.
    Model files are persisted in Olares appData so they survive pod restarts.
  developer: ClawRun
  submitter: ClawRun
  locale:
    - en-US
    - zh-CN
  requiredMemory: 2Gi
  limitedMemory: 16Gi
  requiredDisk: 10Gi
  limitedDisk: 200Gi
  requiredCpu: '0.5'
  limitedCpu: '4'
  supportArch:
    - amd64
    - arm64

options:
  dependencies:
    - name: olares
      type: system
      version: '>=1.10.1-0'
