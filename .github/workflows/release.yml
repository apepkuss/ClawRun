name: Release ClawRun

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Build Docker images on native runners (no QEMU) ──
  build-image:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Package bundled charts
        run: |
          helm package openclaw/ -d clawrun/charts/
          helm package ollama-cpu/oac/ -d clawrun/charts/

      - name: Extract platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: clawrun
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ steps.slug.outputs.slug }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.slug }},mode=max
          outputs: type=image,name=apepkuss/clawrun,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge manifests and release ──
  release:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create multi-platform manifest
        working-directory: /tmp/digests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            -t "apepkuss/clawrun:${VERSION}" \
            -t "apepkuss/clawrun:latest" \
            $(printf 'apepkuss/clawrun@sha256:%s ' *)

      - name: Sync version in charts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|^version:.*|version: '${VERSION}'|"             clawrun/oac/Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: '${VERSION}'|"       clawrun/oac/Chart.yaml
          sed -i "s|^  version:.*|  version: '${VERSION}'|"         clawrun/oac/OlaresManifest.yaml
          sed -i "s|^  versionName:.*|  versionName: '${VERSION}'|" clawrun/oac/OlaresManifest.yaml
          sed -i "s|image: \"apepkuss/clawrun:.*\"|image: \"apepkuss/clawrun:${VERSION}\"|" clawrun/oac/templates/deployment.yaml

      - name: Package ClawRun OAC
        run: |
          mkdir -p dist
          helm package clawrun/oac/ -d dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ClawRun v${{ steps.version.outputs.version }}"
          body: |
            ## ClawRun v${{ steps.version.outputs.version }}

            | Artifact | Details |
            |----------|---------|
            | Docker Image | `apepkuss/clawrun:${{ steps.version.outputs.version }}` |
            | OAC Chart | `clawrun-${{ steps.version.outputs.version }}.tgz` |

            ### Deploy (existing install)
            ```bash
            kubectl set image deployment/clawrun -n clawrun-<username> \
              clawrun="apepkuss/clawrun:${{ steps.version.outputs.version }}"
            ```

            ### Fresh install
            Download `clawrun-${{ steps.version.outputs.version }}.tgz` and install via Olares Market.

            OpenClaw and Ollama CPU charts are bundled inside the ClawRun image and installed from its built-in chart server.
          files: |
            dist/clawrun-${{ steps.version.outputs.version }}.tgz
